name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 大数据可视化网页/app/package-lock.json

      - name: Install & build
        working-directory: 大数据可视化网页/app
        run: |
          npm ci
          npm run build

      - name: Copy build to docs/ (for Pages: main /docs)
        run: |
          rm -rf docs
          cp -r "大数据可视化网页/app/dist" docs
          touch docs/.nojekyll

      - name: Commit docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No changes in docs/"
          else
            git commit -m "docs: update GitHub Pages site [skip ci]"
            git push
          fi

      - name: Also publish to gh-pages branch (backup)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: 大数据可视化网页/app/dist
          publish_branch: gh-pages
          force_orphan: true
