name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 大数据可视化网页/app/package-lock.json

      - name: Install & build
        working-directory: 大数据可视化网页/app
        env:
          GITHUB_PAGES: 'true'
        run: |
          npm ci
          npm run build

      - name: Sync docs/ for GitHub Pages (main branch source)
        run: |
          rm -rf docs/assets
          cp 大数据可视化网页/app/dist/index.html docs/
          cp -r 大数据可视化网页/app/dist/assets docs/
          cp -r 大数据可视化网页/app/dist/data/* docs/data/

      - name: Commit updated docs/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update docs/ site build from CI."
          git push

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: 大数据可视化网页/app/dist
          publish_branch: gh-pages
          force_orphan: true
